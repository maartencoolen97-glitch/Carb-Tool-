<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recept Tool</title>

  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script defer src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.5;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      box-sizing: border-box;
      font-size: 14px;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .buttons button {
      width: auto;
      cursor: pointer;
    }
    .preview {
      margin-top: 40px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: #fafafa;
    }
    .section-title {
      font-weight: bold;
      margin-top: 20px;
      margin-bottom: 8px;
    }
    .meta {
      color: #555;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Recept invullen</h1>

  <label for="title">Titel</label>
  <input id="title" type="text" placeholder="Bijv. Pasta Carbonara" />

  <label for="intro">Intro</label>
  <textarea id="intro" placeholder="Korte introductie..."></textarea>

  <div class="row">
    <div>
      <label for="serves">Porties</label>
      <input id="serves" type="text" placeholder="4 personen" />
    </div>
    <div>
      <label for="time">Tijd</label>
      <input id="time" type="text" placeholder="30 min" />
    </div>
    <div>
      <label for="difficulty">Moeilijkheid</label>
      <input id="difficulty" type="text" placeholder="Makkelijk" />
    </div>
  </div>

  <label for="ingredients">Ingrediënten (1 per regel)</label>
  <textarea id="ingredients"></textarea>

  <label for="preparation">Bereiding (1 stap per regel)</label>
  <textarea id="preparation"></textarea>

  <label for="notesTitle">Titel extra notities</label>
  <input id="notesTitle" type="text" placeholder="Notes" />

  <label for="notes">Notities (1 per regel)</label>
  <textarea id="notes"></textarea>

  <label for="closing">Afsluiting</label>
  <input id="closing" type="text" placeholder="Eet smakelijk!" />

  <div class="buttons">
    <button id="downloadBtn" type="button">Download Word</button>
    <button id="clearBtn" type="button">Leegmaken</button>
  </div>

  <div class="preview" id="preview"></div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const { Document, Packer, Paragraph, TextRun, AlignmentType } = window.docx;

      const els = {
        title: document.getElementById("title"),
        intro: document.getElementById("intro"),
        serves: document.getElementById("serves"),
        time: document.getElementById("time"),
        difficulty: document.getElementById("difficulty"),
        ingredients: document.getElementById("ingredients"),
        preparation: document.getElementById("preparation"),
        notesTitle: document.getElementById("notesTitle"),
        notes: document.getElementById("notes"),
        closing: document.getElementById("closing"),
        preview: document.getElementById("preview"),
        downloadBtn: document.getElementById("downloadBtn"),
        clearBtn: document.getElementById("clearBtn")
      };

      function splitLines(value) {
        return value.split("\n").map(s => s.trim()).filter(Boolean);
      }

      function dataFromForm() {
        return {
          title: els.title.value.trim(),
          intro: els.intro.value.trim(),
          serves: els.serves.value.trim(),
          time: els.time.value.trim(),
          difficulty: els.difficulty.value.trim(),
          ingredients: splitLines(els.ingredients.value),
          preparation: splitLines(els.preparation.value),
          notesTitle: els.notesTitle.value.trim() || "Notes",
          notes: splitLines(els.notes.value),
          closing: els.closing.value.trim()
        };
      }

      function esc(s) {
        return String(s).replace(/[&<>"']/g, function(match) {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          };
          return map[match];
        });
      }

      function renderPreview() {
        const data = dataFromForm();
        const metaParts = [];

        if (data.serves) metaParts.push(`Porties: ${esc(data.serves)}`);
        if (data.time) metaParts.push(`Tijd: ${esc(data.time)}`);
        if (data.difficulty) metaParts.push(`Moeilijkheid: ${esc(data.difficulty)}`);

        els.preview.innerHTML = `
          <h1>${esc(data.title || "Jouw recept")}</h1>
          ${data.intro ? `<p>${esc(data.intro)}</p>` : ""}
          ${metaParts.length ? `<p class="meta">${metaParts.join(" · ")}</p>` : ""}
          <div>
            <div class="section-title">Ingrediënten</div>
            ${data.ingredients.length ? `<ul>${data.ingredients.map(item => `<li>${esc(item)}</li>`).join("")}</ul>` : `<p>Geen ingrediënten ingevuld.</p>`}
          </div>
          <div>
            <div class="section-title">Bereiding</div>
            ${data.preparation.length ? `<ol>${data.preparation.map(step => `<li>${esc(step)}</li>`).join("")}</ol>` : `<p>Geen bereidingsstappen ingevuld.</p>`}
          </div>
          ${data.notes.length ? `<div><div class="section-title">${esc(data.notesTitle)}</div><ul>${data.notes.map(note => `<li>${esc(note)}</li>`).join("")}</ul></div>` : ""}
          ${data.closing ? `<p>${esc(data.closing)}</p>` : ""}
        `;
      }

      async function generateWord() {
        const data = dataFromForm();
        const children = [];

        children.push(new Paragraph({
          alignment: AlignmentType.CENTER,
          children: [new TextRun({ text: data.title || "Jouw recept", bold: true, size: 32 })]
        }));

        if (data.intro) {
          children.push(new Paragraph({
            children: [new TextRun({ text: data.intro, italics: true })]
          }));
        }

        const meta = [];
        if (data.serves) meta.push(`Porties: ${data.serves}`);
        if (data.time) meta.push(`Tijd: ${data.time}`);
        if (data.difficulty) meta.push(`Moeilijkheid: ${data.difficulty}`);

        if (meta.length) {
          children.push(new Paragraph({
            children: [new TextRun({ text: meta.join(" · "), bold: true })]
          }));
        }

        children.push(new Paragraph({
          children: [new TextRun({ text: "Ingrediënten", bold: true, size: 28 })]
        }));

        if (data.ingredients.length) {
          data.ingredients.forEach(item => {
            children.push(new Paragraph({ text: item, bullet: { level: 0 } }));
          });
        } else {
          children.push(new Paragraph("Geen ingrediënten ingevuld."));
        }

        children.push(new Paragraph({
          children: [new TextRun({ text: "Bereiding", bold: true, size: 28 })]
        }));

        if (data.preparation.length) {
          data.preparation.forEach((step, index) => {
            children.push(new Paragraph({
              children: [new TextRun(`${index + 1}. ${step}`)]
            }));
          });
        } else {
          children.push(new Paragraph("Geen bereidingsstappen ingevuld."));
        }

        if (data.notes.length) {
          children.push(new Paragraph({
            children: [new TextRun({ text: data.notesTitle, bold: true, size: 28 })]
          }));
          data.notes.forEach(note => {
            children.push(new Paragraph({ text: note, bullet: { level: 0 } }));
          });
        }

        if (data.closing) {
          children.push(new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [new TextRun({ text: data.closing, bold: true })]
          }));
        }

        const doc = new Document({
          sections: [{ properties: {}, children }]
        });

        const blob = await Packer.toBlob(doc);
        const filename = ((data.title || "recept").toLowerCase().replace(/[^a-z0-9à-ž]+/gi, "-").replace(/^-+|-+$/g, "")) + ".docx";
        saveAs(blob, filename);
      }

      function clearForm() {
        Object.values(els).forEach(el => {
          if (el && "value" in el) el.value = "";
        });
        renderPreview();
      }

      [
        els.title, els.intro, els.serves, els.time, els.difficulty,
        els.ingredients, els.preparation, els.notesTitle, els.notes, els.closing
      ].forEach(el => el.addEventListener("input", renderPreview));

      els.downloadBtn.addEventListener("click", generateWord);
      els.clearBtn.addEventListener("click", clearForm);

      renderPreview();
    });
  </script>
</body>
</html>
